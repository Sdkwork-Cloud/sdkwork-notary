name: Verify

on:
  push:
    branches:
      - main
  pull_request:
  workflow_dispatch:

permissions:
  contents: read

concurrency:
  group: sdkwork-notary-verify-${{ github.ref }}
  cancel-in-progress: true

jobs:
  verify:
    name: SDKWork Verify
    runs-on: ubuntu-latest
    timeout-minutes: 30
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: "22"

      - name: Install Node dependencies
        run: pnpm install --frozen-lockfile=false

      - name: Setup Rust
        uses: dtolnay/rust-toolchain@stable

      - name: Verify
        run: pnpm verify
